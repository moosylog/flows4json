<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flows4JSON - App Store</title>
    <script src="https://cdn.jsdelivr.net/npm/jq-web@0.5.1/jq.wasm.js"></script>
    <style>
        /* MAC APP STORE DESIGN SYSTEM */
        :root {
            --bg-window: #1e1e1e;
            --bg-sidebar: #252525;
            --bg-card: #2c2c2e;
            --bg-card-hover: #3a3a3c;
            --text-primary: #ffffff;
            --text-secondary: #98989d;
            --accent-blue: #0a84ff;
            --accent-blue-hover: #0071e3;
            --accent-green: #30d158;
            --accent-red: #ff453a;
            --border: rgba(255, 255, 255, 0.08);
            --radius-lg: 14px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            --font-mono: "SF Mono", Consolas, "Liberation Mono", Menlo, Courier, monospace;
        }

        * { box-sizing: border-box; font-family: var(--font-stack); -webkit-font-smoothing: antialiased; }
        body { background: var(--bg-window); color: var(--text-primary); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        h1, h2, h3, h4, p { margin: 0; }

        /* BUTTONS */
        button {
            background: rgba(255,255,255,0.1); color: var(--text-primary); border: none;
            padding: 6px 14px; border-radius: 16px; cursor: pointer; font-size: 13px; font-weight: 600;
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        button:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        button:active:not(:disabled) { transform: scale(0.96); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        button.primary { background: var(--text-primary); color: black; }
        button.primary:hover:not(:disabled) { background: #e0e0e0; }
        
        button.accent { background: var(--accent-blue); color: white; }
        button.accent:hover:not(:disabled) { background: var(--accent-blue-hover); }

        /* SIDEBAR */
        .sidebar {
            width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border);
            padding: 24px 16px; display: flex; flex-direction: column; gap: 24px; flex-shrink: 0; z-index: 10;
        }
        .brand { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 0 8px; cursor: pointer;}
        
        .search-box {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white;
            padding: 8px 12px; border-radius: var(--radius-sm); outline: none; font-size: 13px;
        }
        .search-box:focus { border-color: var(--accent-blue); background: rgba(0,0,0,0.4); }

        .sidebar-section-title { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 8px; margin-bottom: 8px; }
        
        /* APPLE SEGMENTED CONTROL */
        .segmented-control {
            display: flex; background: rgba(0,0,0,0.2); padding: 3px; border-radius: 8px; border: 1px solid var(--border);
        }
        .segmented-control label {
            flex: 1; text-align: center; padding: 5px 0; font-size: 12px; font-weight: 500;
            color: var(--text-secondary); cursor: pointer; border-radius: 6px; transition: 0.2s;
        }
        .segmented-control input[type="radio"] { display: none; }
        .segmented-control input[type="radio"]:checked + label {
            background: #4a4a4c; color: white; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        .category-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 2px; }
        .category-item {
            padding: 8px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text-secondary);
            display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 500;
        }
        .category-item:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .category-item.active { background: var(--accent-blue); color: white; }

        /* VIEWS */
        .view-container { flex-grow: 1; position: relative; background: var(--bg-window); }
        .view { display: none; width: 100%; height: 100%; overflow-y: auto; animation: fade 0.2s ease; }
        .view.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* --- LIBRARY VIEW --- */
        .library-content { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .page-title { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
        
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .app-card {
            display: flex; align-items: flex-start; gap: 16px; padding: 16px; border-radius: var(--radius-lg);
            background: transparent; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .app-card:hover { background: var(--bg-card); border-color: rgba(255,255,255,0.05); }
        
        .app-icon {
            width: 64px; height: 64px; border-radius: 16px; flex-shrink: 0;
            background: linear-gradient(135deg, #43CBFF 10%, #9708CC 100%);
            display: flex; align-items: center; justify-content: center; font-size: 24px; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .app-info { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; padding-top: 2px;}
        .app-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
        .app-sub { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Hardware Tags */
        .app-tags { display: flex; gap: 6px; margin-top: 6px; }
        .device-tag { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid var(--border); color: var(--text-secondary); background: rgba(255,255,255,0.05); }
        .device-tag.glove80 { color: #d2a8ff; background: rgba(163, 113, 247, 0.15); border-color: rgba(163, 113, 247, 0.3); }
        .device-tag.go60 { color: #82aaff; background: rgba(130, 170, 255, 0.15); border-color: rgba(130, 170, 255, 0.3); }
        
        .app-action { flex-shrink: 0; padding-top: 10px; }
        .app-action button { background: rgba(255,255,255,0.1); color: var(--accent-blue); padding: 5px 14px; font-size: 12px; border-radius: 14px; }
        .app-card:hover .app-action button { background: var(--accent-blue); color: white; }

        /* --- PRODUCT PAGE (STUDIO) --- */
        .product-page { padding: 0; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100%; }
        
        .nav-back {
            padding: 20px 40px; display: flex; align-items: center; gap: 8px;
            color: var(--accent-blue); cursor: pointer; font-size: 14px; font-weight: 500;
        }
        .nav-back:hover { text-decoration: underline; }

        .product-header {
            padding: 20px 40px 40px 40px; display: flex; gap: 30px; align-items: flex-start;
            border-bottom: 1px solid var(--border);
        }
        .product-icon-large {
            width: 120px; height: 120px; border-radius: 28px; flex-shrink: 0;
            background: linear-gradient(135deg, #43CBFF 10%, #9708CC 100%);
            display: flex; align-items: center; justify-content: center; font-size: 48px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
        }
        .product-header-info { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; justify-content: center; padding-top: 10px;}
        .product-title { font-size: 28px; font-weight: 700; line-height: 1.1; }
        .product-subtitle { font-size: 16px; color: var(--text-secondary); }
        .product-developer { font-size: 13px; color: var(--text-secondary); opacity: 0.7; margin-top: 4px; }
        
        .wizard-area {
            background: var(--bg-card); padding: 16px 20px; border-radius: var(--radius-md);
            margin-top: 16px; display: flex; align-items: center; justify-content: space-between;
            border: 1px solid var(--border);
        }
        .wizard-status { display: flex; flex-direction: column; gap: 4px; }
        .wizard-status-title { font-size: 14px; font-weight: 600; }
        .wizard-status-desc { font-size: 12px; color: var(--text-secondary); }

        .product-body { padding: 40px; display: flex; flex-direction: column; gap: 40px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
        .product-desc { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.85); white-space: pre-wrap; }

        .config-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--bg-card); border-radius: var(--radius-md); overflow: hidden;}
        .config-table th, .config-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        .config-table tr:last-child th, .config-table tr:last-child td { border-bottom: none; }
        .config-table th { color: var(--text-secondary); width: 160px; font-weight: 500; }
        .config-table td { color: var(--text-primary); font-family: var(--font-mono); }

        /* --- DEVELOPER MODE TRAY (IDE STYLE) --- */
        .dev-toggle-wrapper { padding: 40px; text-align: center; border-top: 1px solid var(--border); margin-top: auto; }
        .dev-toggle { background: transparent; color: var(--text-secondary); font-size: 12px; border: none; cursor: pointer; }
        .dev-toggle:hover { color: white; text-decoration: underline; }

        .dev-tray { display: none; flex-direction: column; background: #181818; border-top: 1px solid var(--border); height: 400px; flex-shrink: 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);}
        .dev-tray.active { display: flex; }
        .dev-tray-header { padding: 8px 16px; background: #222222; font-size: 11px; font-weight: 600; color: #a0a0a0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333;}
        .dev-tray-content { display: flex; flex-grow: 1; overflow: hidden; }
        .dev-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; background: #1e1e1e; }
        .dev-pane:last-child { border-right: none; }
        
        textarea { flex-grow: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 16px; font-family: var(--font-mono); font-size: 13px; line-height: 1.5; resize: none; outline: none; }
        textarea:focus { box-shadow: inset 0 0 0 1px var(--accent-blue); }
        
        /* Professional Log Terminal */
        .log-panel { flex-grow: 1; background: #181818; padding: 12px; overflow-y: auto; font-family: var(--font-mono); font-size: 12px; display: flex; flex-direction: column; gap: 2px; }
        .log-entry { padding: 6px 10px; border-radius: 4px; border-left: 3px solid transparent; line-height: 1.4; white-space: pre-wrap; background: rgba(255,255,255,0.02); color: #cccccc;}
        .log-time { color: #666666; margin-right: 8px; font-size: 11px; }
        
        .log-success { border-left-color: var(--accent-green); background: rgba(48, 209, 88, 0.05); }
        .log-danger { border-left-color: var(--accent-red); background: rgba(255, 69, 58, 0.05); }
        .log-info { border-left-color: var(--accent-blue); }
        .log-warning { border-left-color: #ffd60a; background: rgba(255, 214, 10, 0.05); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand" onclick="app.showLibrary()">⚡ Flows4JSON</div>
        
        <div>
            <input type="text" id="searchInput" class="search-box" placeholder="Search automations...">
        </div>

        <div>
            <div class="sidebar-section-title">Hardware Support</div>
            <div class="segmented-control">
                <input type="radio" id="dev-all" name="device" value="all" checked>
                <label for="dev-all">All</label>
                
                <input type="radio" id="dev-go60" name="device" value="go60">
                <label for="dev-go60">Go60</label>
                
                <input type="radio" id="dev-glove" name="device" value="glove80">
                <label for="dev-glove">Glove80</label>
            </div>
        </div>

        <div>
            <div class="sidebar-section-title">Categories</div>
            <ul id="categoryList" class="category-list"></ul>
        </div>
        
        <div style="flex-grow: 1;"></div>
        <button onclick="app.fetchCatalog()" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border);">↻ Refresh Store</button>
    </div>

    <div class="view-container">
        
        <div id="viewLibrary" class="view active">
            <div class="library-content">
                <h1 class="page-title">Discover Automations</h1>
                <div id="catalogGrid" class="app-grid">
                    </div>
            </div>
        </div>

        <div id="viewStudio" class="view">
            <div class="product-page">
                <div class="nav-back" onclick="app.showLibrary()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                    Store
                </div>
                
                <div class="product-header">
                    <div class="product-icon-large" id="studioIcon">⚡</div>
                    <div class="product-header-info">
                        <h1 class="product-title" id="studioTitle">Flow Title</h1>
                        <p class="product-subtitle" id="studioSub">Subtitle goes here</p>
                        <p class="product-developer" id="studioAuthor">moosyresearch</p>
                        
                        <div class="wizard-area" id="wizardBox">
                            </div>
                    </div>
                </div>

                <div class="product-body">
                    <div>
                        <h3 class="section-title">Description</h3>
                        <div class="product-desc" id="studioDesc"></div>
                    </div>
                    
                    <div id="configSection" style="display: none;">
                        <h3 class="section-title">Configuration Parameters</h3>
                        <table class="config-table" id="studioConfig"></table>
                    </div>
                </div>

                <div class="dev-toggle-wrapper">
                    <button class="dev-toggle" onclick="app.toggleDevTray()">{" "} Toggle Developer IDE</button>
                </div>
            </div>
        </div>

    </div>

    <div class="dev-tray" id="devTray">
        <div class="dev-tray-header">
            <span>Developer IDE</span>
            <button style="padding: 2px 8px; font-size: 10px; border-radius: 4px;" onclick="app.toggleDevTray()">Close Drawer</button>
        </div>
        <div class="dev-tray-content">
            <div class="dev-pane">
                <div style="padding: 6px 12px; font-size: 10px; color: #888; background: #181818; border-bottom: 1px solid #333;">flow_script.jq</div>
                <textarea id="jqInput" spellcheck="false"></textarea>
            </div>
            <div class="dev-pane">
                <div style="padding: 6px 12px; font-size: 10px; color: #888; background: #181818; border-bottom: 1px solid #333;">Terminal Output</div>
                <div class="log-panel" id="logPanel"></div>
            </div>
        </div>
    </div>

    <input type="file" id="layoutFile" accept=".json" style="display: none;">

    <script>
        // ==========================================
        // IDE LOGGER
        // ==========================================
        class Logger {
            constructor(panelId) { this.panel = document.getElementById(panelId); }
            print(msg, type = "info") {
                const entry = document.createElement('div');
                entry.className = `log-entry log-${type}`;
                const time = new Date().toLocaleTimeString('en-US', { hour12: false });
                entry.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
                this.panel.appendChild(entry);
                this.panel.scrollTop = this.panel.scrollHeight;
            }
            clear() { this.panel.innerHTML = ''; }
        }
        const terminal = new Logger('logPanel');

        // Simple gradient generator based on string
        function getGradient(str) {
            const colors = [
                ['#FF3B30', '#FF9500'], ['#34C759', '#30D158'], 
                ['#007AFF', '#5AC8FA'], ['#AF52DE', '#FF2D55'], 
                ['#FF9500', '#FFCC00'], ['#5856D6', '#AF52DE']
            ];
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            const pair = colors[Math.abs(hash) % colors.length];
            return `linear-gradient(135deg, ${pair[0]} 0%, ${pair[1]} 100%)`;
        }

        function getEmoji(category) {
            const map = { 'colemak': '⌨️', 'automation': '⚡', 'gaming': '🎮', 'mac': '🍎', 'windows': '🪟' };
            for (let key in map) if (category.toLowerCase().includes(key)) return map[key];
            return '✨';
        }

        // ==========================================
        // MAIN APP ENGINE
        // ==========================================
        class FlowsStoreApp {
            constructor() {
                this.apiUrl = `https://api.github.com/repos/moosylog/flows4json/contents/`;
                this.catalog = [];
                this.activeCategory = 'All';
                
                this.activeFlow = null;
                this.sourceAST = null;
                this.outputAST = null;
                this.fileName = "compiled_layout.json";
                this.wizardState = "upload"; 

                this.bindEvents();
                this.fetchCatalog();
            }

            bindEvents() {
                document.getElementById('searchInput').addEventListener('input', () => this.renderGrid());
                document.querySelectorAll('input[name="device"]').forEach(r => r.addEventListener('change', () => this.renderGrid()));
                document.getElementById('layoutFile').addEventListener('change', (e) => this.loadTargetJSON(e));
            }

            toggleDevTray() {
                document.getElementById('devTray').classList.toggle('active');
            }

            // --- ROUTING ---
            showLibrary() {
                document.getElementById('viewStudio').classList.remove('active');
                document.getElementById('viewLibrary').classList.add('active');
                this.activeFlow = null;
                this.sourceAST = null;
                document.getElementById('devTray').classList.remove('active');
            }

            showStudio(flowData) {
                this.activeFlow = flowData;
                this.wizardState = "upload";
                this.sourceAST = null;

                document.getElementById('viewLibrary').classList.remove('active');
                document.getElementById('viewStudio').classList.add('active');

                // Populate Product Page
                document.getElementById('studioIcon').style.background = getGradient(flowData.title);
                document.getElementById('studioIcon').innerText = getEmoji(flowData.category);
                
                document.getElementById('studioTitle').innerText = flowData.title;
                document.getElementById('studioSub').innerText = flowData.subtitle || flowData.category;
                document.getElementById('studioAuthor').innerText = `Developer: ${flowData.author || 'moosyresearch'}`;
                document.getElementById('studioDesc').innerText = flowData.description || 'No detailed description provided.';
                
                // Config Table
                const configSec = document.getElementById('configSection');
                const configTable = document.getElementById('studioConfig');
                if (Object.keys(flowData.config).length > 0) {
                    configSec.style.display = 'block';
                    configTable.innerHTML = '';
                    for (let [k, v] of Object.entries(flowData.config)) {
                        configTable.innerHTML += `<tr><th>${k}</th><td>${v}</td></tr>`;
                    }
                } else {
                    configSec.style.display = 'none';
                }

                // Dev Tray
                document.getElementById('jqInput').value = flowData.script;
                terminal.clear();
                
                this.renderWizard();
            }

            // --- WIZARD UI ---
            renderWizard() {
                const box = document.getElementById('wizardBox');
                if (this.wizardState === "upload") {
                    box.innerHTML = `
                        <div class="wizard-status">
                            <span class="wizard-status-title">Ready to Install</span>
                            <span class="wizard-status-desc">Provide your current JSON layout to begin.</span>
                        </div>
                        <button class="primary" onclick="document.getElementById('layoutFile').click()">Choose File</button>
                    `;
                } else if (this.wizardState === "loading") {
                    box.innerHTML = `
                        <div class="wizard-status">
                            <span class="wizard-status-title">Processing...</span>
                            <span class="wizard-status-desc">Parsing JSON structure.</span>
                        </div>
                        <button disabled>Please Wait</button>
                    `;
                } else if (this.wizardState === "error") {
                    box.innerHTML = `
                        <div class="wizard-status">
                            <span class="wizard-status-title" style="color: var(--accent-red);">Parse Error</span>
                            <span class="wizard-status-desc">${this.wizardError || 'Something went wrong.'}</span>
                        </div>
                        <button onclick="document.getElementById('layoutFile').click()">Try Again</button>
                    `;
                } else if (this.wizardState === "ready") {
                    box.innerHTML = `
                        <div class="wizard-status">
                            <span class="wizard-status-title" style="color: var(--accent-blue);">Layout Loaded</span>
                            <span class="wizard-status-desc">${this.fileName} is ready.</span>
                        </div>
                        <button class="accent" onclick="app.runFlow()">Apply Mod</button>
                    `;
                } else if (this.wizardState === "success") {
                    box.innerHTML = `
                        <div class="wizard-status">
                            <span class="wizard-status-title" style="color: var(--accent-green);">Success</span>
                            <span class="wizard-status-desc">Modifications applied cleanly.</span>
                        </div>
                        <button class="primary" style="background: var(--accent-green); color: black;" onclick="app.saveJSON()">Download Layout</button>
                    `;
                }
            }

            // --- CATALOG LOGIC ---
            parseFlowFile(content) {
                const extVal = (key) => { const m = content.match(new RegExp(`${key}\\s*=\\s*"([^"]+)"`)); return m ? m[1] : ''; };
                const extMulti = (key) => { const m = content.match(new RegExp(`${key}\\s*=\\s*"""([\\s\\S]*?)"""`)); return m ? m[1].trim() : ''; };
                const extCat = () => { const m = content.match(/\[config\][\s\S]*?foo\s*=\s*"([^"]+)"/); return m ? m[1] : 'Utilities'; };
                
                const extConfig = () => {
                    let cfg = {};
                    const m = content.match(/\[config\]([\s\S]*?)(?:\[|$)/);
                    if (m) {
                        m[1].split('\n').forEach(l => {
                            const kv = l.match(/^\s*([a-zA-Z0-9_\-]+)\s*=\s*(.+?)\s*$/);
                            if (kv) {
                                let v = kv[2].trim();
                                if (v.startsWith('"') && v.endsWith('"')) v = v.slice(1, -1);
                                cfg[kv[1]] = v;
                            }
                        });
                    }
                    return cfg;
                };

                const extDev = () => {
                    const m = content.match(/keyboards\s*=\s*\[(.*?)\]/);
                    if (!m) return [];
                    return m[1].split(',').map(s => s.replace(/"/g, '').trim()).filter(Boolean);
                };

                return {
                    uid: extVal("uid"), title: extVal("title") || "Untitled", subtitle: extVal("subtitle"),
                    description: extMulti("description"), script: extMulti("script"), category: extCat(),
                    author: extVal("author"), devices: extDev(), config: extConfig()
                };
            }

            async fetchCatalog() {
                const grid = document.getElementById('catalogGrid');
                grid.innerHTML = '<p style="color:var(--text-secondary);">Connecting to App Store...</p>';
                this.catalog = [];

                try {
                    const response = await fetch(this.apiUrl);
                    if (!response.ok) throw new Error("API Limit Reached");
                    const files = await response.json();
                    const flowFiles = files.filter(f => f.name.endsWith('.flows'));

                    for (let file of flowFiles) {
                        const raw = await (await fetch(file.download_url)).text();
                        this.catalog.push(this.parseFlowFile(raw));
                    }
                    this.renderCategories();
                    this.renderGrid();
                } catch (err) { grid.innerHTML = `<p style="color:var(--accent-red);">Error: ${err.message}</p>`; }
            }

            renderCategories() {
                const counts = { 'All': this.catalog.length };
                this.catalog.forEach(f => { counts[f.category] = (counts[f.category] || 0) + 1; });
                const list = document.getElementById('categoryList');
                list.innerHTML = '';
                
                Object.keys(counts).sort().forEach(cat => {
                    const li = document.createElement('li');
                    li.className = `category-item ${this.activeCategory === cat ? 'active' : ''}`;
                    li.innerHTML = `<span>${cat}</span> <span class="category-count">${counts[cat]}</span>`;
                    li.onclick = () => { this.activeCategory = cat; this.renderCategories(); this.renderGrid(); };
                    list.appendChild(li);
                });
            }

            renderGrid() {
                const grid = document.getElementById('catalogGrid');
                const searchQ = document.getElementById('searchInput').value.toLowerCase();
                const activeDevice = document.querySelector('input[name="device"]:checked').value.toLowerCase();
                
                grid.innerHTML = '';
                let filtered = this.catalog.filter(f => {
                    const matchesCat = this.activeCategory === 'All' || f.category === this.activeCategory;
                    const matchesSearch = f.title.toLowerCase().includes(searchQ) || f.description.toLowerCase().includes(searchQ);
                    
                    let matchesDevice = true;
                    if (activeDevice !== 'all') {
                        const flowDevs = f.devices.map(d => d.toLowerCase());
                        matchesDevice = flowDevs.includes(activeDevice);
                    }
                    
                    return matchesCat && matchesSearch && matchesDevice;
                });

                if (filtered.length === 0) {
                    grid.innerHTML = '<p style="color:var(--text-secondary);">No automations found matching filters.</p>';
                    return;
                }

                filtered.forEach(flow => {
                    const card = document.createElement('div');
                    card.className = 'app-card';
                    card.onclick = () => this.showStudio(flow);

                    const bg = getGradient(flow.title);
                    const emoji = getEmoji(flow.category);
                    
                    // Generate Hardware Tags
                    const tagsHtml = flow.devices.map(d => {
                        let type = d.toLowerCase();
                        if (type === 'go60' || type === 'glove80') return `<span class="device-tag ${type}">${d}</span>`;
                        return `<span class="device-tag">${d}</span>`;
                    }).join('');

                    card.innerHTML = `
                        <div class="app-icon" style="background: ${bg};">${emoji}</div>
                        <div class="app-info">
                            <div class="app-title">${flow.title}</div>
                            <div class="app-sub">${flow.subtitle || flow.category}</div>
                            <div class="app-tags">${tagsHtml}</div>
                        </div>
                        <div class="app-action"><button>View</button></div>
                    `;
                    grid.appendChild(card);
                });
            }

            // --- EXECUTION ENGINE ---
            async loadTargetJSON(e) {
                const file = e.target.files[0];
                if (!file) return;
                e.target.value = ''; // Reset input to allow re-uploading same file
                
                this.wizardState = "loading";
                this.renderWizard();
                terminal.print(`Reading file: ${file.name}...`, "info");

                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        let rawAST = JSON.parse(event.target.result);
                        this.fileName = `${this.activeFlow.uid || 'flow'}_${file.name}`;
                        
                        // Internal setup logic
                        const prologue = `(.keymap // .) |= (.layout = (if .layout != null and .layout.keys != null and (.layout.keys | length) > 0 then .layout elif .keymap != null and .keymap.layout != null and (.keymap.layout.keys | length) > 0 then .keymap.layout else {"keys": [ range(0; 60) as $i | { "i": $i, "label": (if $i < 30 then "L_C" else "R_C" end) } ]} end))`;
                        
                        if (typeof jq === 'undefined') throw new Error("JQ Engine not loaded. Check internet connection.");
                        this.sourceAST = await jq.json(rawAST, prologue);
                        
                        this.wizardState = "ready";
                        this.renderWizard();
                        terminal.print(`AST structure normalized and mapped successfully.`, "success");
                    } catch (err) { 
                        this.wizardState = "error";
                        this.wizardError = "Invalid JSON structure.";
                        this.renderWizard();
                        terminal.print(`Parse Error: ${err.message}`, "danger");
                        document.getElementById('devTray').classList.add('active'); // Auto-open logs on error
                    }
                };
                reader.readAsText(file);
            }

            async runFlow() {
                if (!this.sourceAST) return;
                const script = document.getElementById('jqInput').value.trim();
                
                this.wizardState = "loading";
                this.renderWizard();
                terminal.print("Initiating jq.wasm bridge execution...", "info");

                try {
                    const result = await jq.json(this.sourceAST, script);
                    if (!result) throw new Error("Script execution evaluated to null.");
                    
                    this.outputAST = result;
                    terminal.print(`Execution Successful. Target memory updated.`, "success");
                    
                    this.wizardState = "success";
                    this.renderWizard();
                } catch (error) {
                    this.wizardState = "error";
                    this.wizardError = "Script execution failed.";
                    this.renderWizard();
                    terminal.print(`Execution Error: ${error.message}`, "danger");
                    document.getElementById('devTray').classList.add('active'); // Auto-open logs on error
                }
            }

            async saveJSON() {
                if (!this.outputAST) return;
                try {
                    const filter = `(.keymap // .) |= ((if (.holdTaps | type == "array" and length == 0) then del(.holdTaps) else . end) | (if (.macros | type == "array" and length == 0) then del(.macros) else . end) | (if (.combos | type == "array" and length == 0) then del(.combos) else . end) | (if (.behaviors | type == "array" and length == 0) then del(.behaviors) else . end))`;
                    let cleanAST = await jq.json(this.outputAST, filter);
                    
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cleanAST, null, 2));
                    const a = document.createElement('a');
                    a.href = dataStr; a.download = this.fileName; a.click();
                    
                    terminal.print(`Sanitized output downloaded as ${this.fileName}`, "success");
                } catch (err) { terminal.print(`Save Error: ${err.message}`, "danger"); }
            }
        }

        const app = new FlowsStoreApp();
    </script>
</body>
</html>
