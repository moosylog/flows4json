name: Auto-Build Store Catalog

on:
  push:
    branches: [ "main" ] # Runs every time you upload to main
  workflow_dispatch:     # Allows you to run it manually from the Actions tab

permissions:
  contents: write        # Gives the robot permission to save the catalog.json file

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate catalog.json
        run: node scripts/build-catalog.js

      - name: Save to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git commit -m "Auto-generated store catalog [skip ci]" || echo "No changes"
          git push
